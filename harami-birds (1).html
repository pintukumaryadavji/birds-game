<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HARAMI BIRDS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap');

  :root{
    --sky-top:#170c2e;
    --sky-mid:#5a2a6b;
    --sky-bottom:#ff7b4d;
    --sun:#ffd166;
    --bird:#e6394b;
    --bird-dark:#a91f2c;
    --belly:#fff3d6;
    --pipe:#ff7a1a;
    --pipe-dark:#7a2008;
    --wood:#a9682f;
    --wood-dark:#7a481f;
    --stone:#8d96a8;
    --stone-dark:#5e6678;
    --accent:#ffb703;
    --accent-2:#06d6a0;
    --text:#fff7e8;
    --panel:#1a0f30ee;
    --panel-border:#ffb70355;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:transparent;
    font-family:'Nunito',sans-serif;
    color:var(--text);
    display:flex;
    justify-content:center;
    -webkit-tap-highlight-color:transparent;
  }

  .stage{
    position:relative;
    width:400px;
    max-width:100%;
    user-select:none;
  }

  canvas{
    display:block;
    width:100%;
    height:auto;
    border-radius:14px;
    box-shadow:0 18px 40px -10px #00000080, inset 0 0 0 2px #ffffff14;
    touch-action:none;
    cursor:pointer;
  }

  h1.title{
    font-family:'Baloo 2',sans-serif;
    font-size:34px;
    font-weight:800;
    margin:0 0 2px;
    text-align:center;
    letter-spacing:0.5px;
    background:linear-gradient(180deg,#fff, var(--accent));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 2px 0 #00000040;
  }
  p.subtitle{
    text-align:center;
    margin:0 0 16px;
    font-size:13px;
    color:#e9d8ff;
    opacity:0.85;
  }

  .overlay{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:radial-gradient(120% 100% at 50% 0%, #2a154499, #0d061c 80%);
    border-radius:14px;
    text-align:center;
    gap:10px;
  }
  .overlay.hidden{ display:none; }

  .panel{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:12px;
    padding:16px 18px;
    width:100%;
    max-width:300px;
  }

  input.name-input{
    width:100%;
    padding:10px 12px;
    border-radius:8px;
    border:2px solid var(--panel-border);
    background:#0d0620;
    color:var(--text);
    font-family:'Nunito',sans-serif;
    font-size:15px;
    font-weight:700;
    outline:none;
    margin-bottom:10px;
  }
  input.name-input:focus{ border-color:var(--accent); }

  button{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:16px;
    letter-spacing:0.3px;
    border:none;
    border-radius:10px;
    padding:11px 18px;
    cursor:pointer;
    color:#1a0f30;
    background:linear-gradient(180deg, var(--accent), #e08e00);
    box-shadow:0 4px 0 #8a5800, 0 6px 14px #00000050;
    transition:transform .08s ease;
    width:100%;
  }
  button:active{ transform:translateY(3px); box-shadow:0 1px 0 #8a5800; }
  button:disabled{ opacity:0.4; cursor:not-allowed; box-shadow:none; transform:none; }

  button.secondary{
    background:linear-gradient(180deg, #3a2a55, #251a3d);
    color:var(--text);
    box-shadow:0 4px 0 #140c22, 0 6px 14px #00000050;
  }

  .leaderboard{ width:100%; text-align:left; margin-top:6px; }
  .leaderboard h3{
    font-family:'Baloo 2',sans-serif;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--accent);
    margin:0 0 6px;
    text-align:center;
  }
  .lb-row{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    font-weight:700;
    padding:4px 6px;
    border-radius:6px;
  }
  .lb-row:nth-child(odd){ background:#ffffff0a; }
  .lb-rank{ color:var(--accent); width:22px; }
  .lb-empty{ font-size:12px; opacity:0.6; text-align:center; padding:6px; }

  .hud{
    position:absolute;
    top:10px; left:10px; right:10px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    pointer-events:none;
    font-family:'Baloo 2',sans-serif;
  }
  .score-box{
    font-size:30px;
    font-weight:800;
    color:#fff;
    text-shadow:0 2px 4px #00000080;
  }
  .player-tag{
    font-size:11px;
    font-weight:700;
    color:var(--accent);
    background:#00000055;
    padding:2px 8px;
    border-radius:6px;
    margin-bottom:2px;
    display:inline-block;
  }
  .boost-wrap{
    width:90px;
    text-align:right;
  }
  .boost-label{
    font-size:10px;
    letter-spacing:1px;
    color:var(--accent-2);
    margin-bottom:3px;
    text-shadow:0 1px 2px #000;
  }
  .boost-bar-bg{
    width:100%;
    height:10px;
    border-radius:6px;
    background:#00000060;
    border:1px solid #ffffff30;
    overflow:hidden;
  }
  .boost-bar-fill{
    height:100%;
    background:linear-gradient(90deg, var(--accent-2), #4cf2c0);
    width:0%;
    transition:width 0.1s linear;
  }
  .boost-bar-fill.full{
    background:linear-gradient(90deg, var(--accent), #fff176);
    box-shadow:0 0 8px var(--accent);
  }

  .boost-btn-wrap{
    position:absolute;
    bottom:14px;
    right:14px;
    pointer-events:auto;
  }
  .boost-btn{
    width:64px; height:64px;
    border-radius:50%;
    font-size:11px;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
    line-height:1.1;
  }

  .hint{
    position:absolute;
    bottom:14px; left:14px;
    font-size:11px;
    color:#ffffffaa;
    pointer-events:none;
    background:#00000050;
    padding:4px 8px;
    border-radius:6px;
  }

  .final-score{
    font-family:'Baloo 2',sans-serif;
    font-size:46px;
    font-weight:800;
    color:var(--accent);
    margin:0;
    text-shadow:0 2px 6px #00000080;
  }
  .final-sub{ font-size:13px; opacity:0.85; margin:0 0 8px; }
  .btn-row{ display:flex; gap:8px; width:100%; max-width:300px; }

  .level-badge{
    font-size:10px;
    font-weight:700;
    letter-spacing:1px;
    padding:2px 8px;
    border-radius:6px;
    margin-bottom:2px;
    display:inline-block;
    background:#00000055;
  }

  .history-link{
    background:none;
    border:none;
    color:#cbb8ff;
    font-family:'Nunito',sans-serif;
    font-size:12px;
    font-weight:700;
    text-decoration:underline;
    width:auto;
    padding:2px 4px;
    box-shadow:none;
    cursor:pointer;
  }
  .history-link:active{ transform:none; box-shadow:none; }

  .history-overlay{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:20px 18px;
    background:#0d0620f0;
    border-radius:14px;
    z-index:5;
  }
  .history-overlay.hidden{ display:none; }
  .history-overlay h3{
    font-family:'Baloo 2',sans-serif;
    font-size:16px;
    color:var(--accent);
    margin:4px 0 10px;
  }
  .history-list{
    width:100%;
    max-width:320px;
    overflow-y:auto;
    flex:1;
  }
  .history-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12.5px;
    padding:7px 8px;
    border-radius:7px;
    margin-bottom:4px;
    background:#ffffff0a;
  }
  .history-row .h-score{ font-weight:800; color:var(--accent); font-size:15px; }
  .history-row .h-meta{ opacity:0.75; font-size:11px; }
  .history-close{ max-width:200px; margin-top:10px; }

  .mute-btn{
    position:absolute;
    top:2px; right:6px;
    width:30px; height:30px;
    border-radius:50%;
    font-size:14px;
    padding:0;
    background:#00000055;
    box-shadow:none;
    color:var(--text);
    z-index:6;
  }
  .mute-btn:active{ transform:none; box-shadow:none; }
</style>
</head>
<body>

<div class="stage">
  <button class="mute-btn" id="muteBtn" title="Toggle sound">🔊</button>
  <h1 class="title">HARAMI BIRDS</h1>
  <p class="subtitle">Flap to fly. Dodge the flame pillars. Charge the slingshot to smash through blocks.</p>

  <div style="position:relative;">
    <canvas id="game" width="400" height="600"></canvas>

    <div class="hud" id="hud" style="display:none;">
      <div>
        <div class="player-tag" id="playerTag">PLAYER</div>
        <div class="level-badge" id="levelBadge">EASY</div>
        <div class="score-box" id="scoreBox">0</div>
      </div>
      <div class="boost-wrap">
        <div class="boost-label">SLINGSHOT</div>
        <div class="boost-bar-bg"><div class="boost-bar-fill" id="boostFill"></div></div>
      </div>
    </div>

    <div class="boost-btn-wrap" id="boostBtnWrap" style="display:none;">
      <button class="boost-btn" id="boostBtn" disabled>BOOST</button>
    </div>

    <div class="hint" id="hint" style="display:none;">tap / space = flap</div>

    <div class="overlay" id="loginOverlay">
      <div class="panel">
        <input class="name-input" id="nameInput" maxlength="16" placeholder="Enter your name" autocomplete="off">
        <button id="startBtn">Start Game</button>
      </div>
      <div class="panel leaderboard" id="loginLeaderboard">
        <h3>Top Flyers</h3>
        <div id="loginLbRows"><div class="lb-empty">Loading…</div></div>
        <div style="text-align:center; margin-top:8px;">
          <button class="history-link" id="historyBtnLogin">View my game history</button>
        </div>
      </div>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
      <p class="final-sub" id="goSub">GAME OVER</p>
      <p class="final-score" id="finalScore">0</p>
      <div class="panel leaderboard" id="goLeaderboard">
        <h3>Top Flyers</h3>
        <div id="goLbRows"><div class="lb-empty">Loading…</div></div>
      </div>
      <div class="btn-row">
        <button class="secondary" id="switchPlayerBtn">Switch Player</button>
        <button id="retryBtn">Fly Again</button>
      </div>
      <button class="history-link" id="historyBtnGO" style="margin-top:6px;">View full game history</button>
    </div>

    <div class="history-overlay hidden" id="historyOverlay">
      <h3>Your Game History</h3>
      <div class="history-list" id="historyList"><div class="lb-empty">Loading…</div></div>
      <button class="secondary history-close" id="historyCloseBtn">Close</button>
    </div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const GROUND_H = 56;

  // ---------- Storage helpers ----------
  async function lbKey(name){ return 'score:' + name.toLowerCase(); }

  async function getProfile(){
    try{
      const r = await window.storage.get('profile:lastUsername', false);
      return r ? r.value : '';
    }catch(e){ return ''; }
  }
  async function setProfile(name){
    try{ await window.storage.set('profile:lastUsername', name, false); }catch(e){}
  }
  async function getScore(name){
    try{
      const r = await window.storage.get(await lbKey(name), true);
      return r ? JSON.parse(r.value) : null;
    }catch(e){ return null; }
  }
  async function saveScoreIfBest(name, score, blocks){
    try{
      const existing = await getScore(name);
      if(!existing || score > existing.best){
        await window.storage.set(await lbKey(name), JSON.stringify({
          username:name, best:score, blocks: blocks||0, updatedAt: Date.now()
        }), true);
      }
    }catch(e){ console.error('save score failed', e); }
  }
  async function fetchLeaderboard(limit){
    try{
      const list = await window.storage.list('score:', true);
      if(!list || !list.keys || !list.keys.length) return [];
      const entries = [];
      for(const k of list.keys){
        try{
          const r = await window.storage.get(k, true);
          if(r) entries.push(JSON.parse(r.value));
        }catch(e){}
      }
      entries.sort((a,b)=> b.best - a.best);
      return entries.slice(0, limit||5);
    }catch(e){ return []; }
  }
  function renderLeaderboard(container, entries, highlightName){
    if(!entries.length){
      container.innerHTML = '<div class="lb-empty">No flights yet — be the first!</div>';
      return;
    }
    container.innerHTML = entries.map((e,i)=>{
      const mine = highlightName && e.username.toLowerCase() === highlightName.toLowerCase();
      return `<div class="lb-row" style="${mine?'color:var(--accent)':''}">
        <span><span class="lb-rank">#${i+1}</span>${escapeHtml(e.username)}</span>
        <span>${e.best}</span>
      </div>`;
    }).join('');
  }
  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- History helpers (every play saved, not just best) ----------
  async function saveHistory(entry){
    try{
      await window.storage.set('history:' + Date.now(), JSON.stringify(entry), false);
    }catch(e){ console.error('save history failed', e); }
  }
  async function fetchHistory(limit){
    try{
      const list = await window.storage.list('history:', false);
      if(!list || !list.keys || !list.keys.length) return [];
      const entries = [];
      for(const k of list.keys){
        try{
          const r = await window.storage.get(k, false);
          if(r) entries.push(JSON.parse(r.value));
        }catch(e){}
      }
      entries.sort((a,b)=> b.timestamp - a.timestamp);
      return entries.slice(0, limit||50);
    }catch(e){ return []; }
  }
  function renderHistory(container, entries){
    if(!entries.length){
      container.innerHTML = '<div class="lb-empty">No games played yet — your runs will show up here.</div>';
      return;
    }
    container.innerHTML = entries.map(e=>{
      const d = new Date(e.timestamp);
      const dateStr = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      return `<div class="history-row">
        <span>
          <div class="h-meta">${escapeHtml(e.username||'')} · ${dateStr}</div>
          <div class="h-meta">${escapeHtml(e.level||'')} · ${e.blocks||0} blocks smashed</div>
        </span>
        <span class="h-score">${e.score}</span>
      </div>`;
    }).join('');
  }

  const GAME_OVER_AUDIO_SRC = "./makabhosda_aag.mp3";
  // ---------- Sound engine (synthesized, no external files) ----------
  let audioCtx = null;
  let muted = false;
  function ensureAudio(){
    if(!audioCtx){
      try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e){ return null; }
    }
    if(audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function tone(freq, duration, type, gainStart, endFreq, delay){
    if(muted) return;
    const ctx2 = ensureAudio();
    if(!ctx2) return;
    const t0 = ctx2.currentTime + (delay||0);
    const osc = ctx2.createOscillator();
    const gain = ctx2.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    if(endFreq) osc.frequency.exponentialRampToValueAtTime(Math.max(1,endFreq), t0+duration);
    gain.gain.setValueAtTime(gainStart||0.18, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0+duration);
    osc.connect(gain).connect(ctx2.destination);
    osc.start(t0);
    osc.stop(t0+duration+0.02);
  }
  function playFlapSound(){ tone(560, 0.09, 'triangle', 0.14, 820); }
  function playBoostSound(){
    tone(180, 0.25, 'sawtooth', 0.16, 60);
    tone(900, 0.12, 'square', 0.06, 1400, 0.02);
  }
  function playSmashSound(){
    tone(220, 0.14, 'square', 0.16, 70);
    tone(90, 0.18, 'sawtooth', 0.12, 40, 0.02);
  }
  function playLevelUpSound(){
    tone(523, 0.1, 'triangle', 0.14, null, 0);
    tone(659, 0.1, 'triangle', 0.14, null, 0.09);
    tone(784, 0.16, 'triangle', 0.16, null, 0.18);
  }
  let gameOverAudioEl = null;
  function preloadGameOverSound(){
    // Pre-create audio element after first user interaction so it can play freely
    if(!gameOverAudioEl){
      try{
        gameOverAudioEl = new Audio(GAME_OVER_AUDIO_SRC);
        gameOverAudioEl.volume = 0.85;
        gameOverAudioEl.load();
      }catch(e){}
    }
  }
  function playGameOverSound(){
    if(muted) return;
    try{
      if(!gameOverAudioEl){
        gameOverAudioEl = new Audio(GAME_OVER_AUDIO_SRC);
        gameOverAudioEl.volume = 0.85;
      }
      // Create a fresh Audio element each time to avoid seek/state issues
      const snd = new Audio(GAME_OVER_AUDIO_SRC);
      snd.volume = 0.85;
      snd.play().catch((err)=>{ console.warn('game over audio failed:', err); });
    }catch(e){ console.error('game over audio failed', e); }
  }

  // ---------- Game constants ----------
  const GRAVITY = 1160;
  const FLAP_V = -340;
  const BIRD_X = 96;
  const BIRD_R = 15;
  const BASE_SPEED = 120;
  const GAP_H = 168;
  const PIPE_W = 58;
  const SPAWN_GAP = 280;
  const BOOST_MAX = 100;
  const BOOST_GAIN = 26;
  const BOOST_DURATION = 1.1;

  const LEVELS = [
    { name:'EASY',      threshold:0,  speedAdd:0,  gapH:175, blockChance:0.20, spawnGap:290, color:'#06d6a0' },
    { name:'MEDIUM',    threshold:12, speedAdd:32, gapH:156, blockChance:0.29, spawnGap:265, color:'#ffd166' },
    { name:'HARD',      threshold:26, speedAdd:66, gapH:142, blockChance:0.37, spawnGap:240, color:'#ff8c42' },
    { name:'VERY HARD', threshold:45, speedAdd:100, gapH:130, blockChance:0.45, spawnGap:215, color:'#e6394b' }
  ];
  const ESCALATE_EVERY = 15; // once past the last named tier, ramp further every N points
  function getDifficulty(s){
    let tier = LEVELS[0];
    for(let i=0;i<LEVELS.length;i++){ if(s >= LEVELS[i].threshold) tier = LEVELS[i]; }
    const lastTier = LEVELS[LEVELS.length-1];
    if(tier === lastTier && s > lastTier.threshold){
      const extra = Math.floor((s - lastTier.threshold) / ESCALATE_EVERY);
      if(extra > 0){
        return {
          name: lastTier.name + ' ×' + (extra+1),
          speedAdd: lastTier.speedAdd + extra*15,
          gapH: Math.max(98, lastTier.gapH - extra*5),
          blockChance: Math.min(0.58, lastTier.blockChance + extra*0.02),
          spawnGap: Math.max(165, lastTier.spawnGap - extra*6),
          color: lastTier.color
        };
      }
    }
    return tier;
  }

  // ---------- State ----------
  let state = 'login'; // login | ready | playing | gameover
  let username = '';
  let bird, obstacles, score, boost, boosting, boostTimer, speed, spawnTimer, flapAnim, blocksDestroyed, bg, currentDiff, levelName, levelBanner;
  let lastTime = 0;

  function resetGame(){
    bird = { y: H/2, vy: 0, wing: 0, rot: 0 };
    obstacles = [];
    score = 0;
    boost = 0;
    boosting = false;
    boostTimer = 0;
    speed = BASE_SPEED;
    spawnTimer = 0;
    flapAnim = 0;
    blocksDestroyed = 0;
    bg = { cloud: 0, mountain: 0, ground: 0 };
    currentDiff = getDifficulty(0);
    levelName = currentDiff.name;
    levelBanner = 0;
  }

  function spawnObstacle(){
    const isBlock = Math.random() < currentDiff.blockChance;
    if(isBlock){
      const h = 90 + Math.random()*170;
      obstacles.push({ type:'block', x: W+30, w: 50, h: h, hp:1, passed:false, destroyed:false });
    } else {
      const margin = 70;
      const gapY = margin + Math.random()*(H - GROUND_H - currentDiff.gapH - margin*2);
      obstacles.push({ type:'pipe', x: W+30, w: PIPE_W, gapY, gapH: currentDiff.gapH, passed:false });
    }
  }

  function flap(){
    if(state !== 'playing') return;
    bird.vy = FLAP_V;
    flapAnim = 1;
    playFlapSound();
  }

  function tryBoost(){
    if(state !== 'playing') return;
    if(boost >= BOOST_MAX && !boosting){
      boosting = true;
      boostTimer = BOOST_DURATION;
      boost = 0;
      playBoostSound();
    }
  }

  function update(dt){
    if(state !== 'playing') return;

    bg.cloud = (bg.cloud + dt*8) % W;
    bg.mountain = (bg.mountain + dt*speed*0.25) % W;
    bg.ground = (bg.ground + dt*speed) % 40;

    bird.vy += GRAVITY*dt;
    bird.y += bird.vy*dt;
    if(flapAnim>0) flapAnim -= dt*4;

    const targetTilt = Math.max(-0.45, Math.min(0.85, bird.vy/700));
    bird.rot += (targetTilt - bird.rot) * Math.min(1, dt*8);

    if(boosting){
      boostTimer -= dt;
      if(boostTimer<=0){ boosting=false; }
    }

    if(bird.y - BIRD_R < 0){ bird.y = BIRD_R; bird.vy = 0; }

    if(bird.y + BIRD_R >= H - GROUND_H){
      bird.y = H - GROUND_H - BIRD_R;
      return endGame();
    }

    speed = BASE_SPEED + currentDiff.speedAdd;

    const newDiff = getDifficulty(score);
    if(newDiff.name !== levelName){
      currentDiff = newDiff;
      levelName = newDiff.name;
      levelBanner = 1.6;
      levelBadge.textContent = newDiff.name;
      levelBadge.style.color = newDiff.color;
      playLevelUpSound();
    }
    if(levelBanner > 0) levelBanner -= dt;

    spawnTimer -= dt;
    if(spawnTimer<=0){
      spawnObstacle();
      spawnTimer = currentDiff.spawnGap / speed;
    }

    for(const ob of obstacles){
      ob.x -= speed*dt;

      if(ob.type==='pipe'){
        const within = bird.y - BIRD_R < ob.x + ob.w && bird.x !== undefined;
      }
      const overlapX = (BIRD_X + BIRD_R) > ob.x && (BIRD_X - BIRD_R) < ob.x + ob.w;

      if(ob.type==='pipe' && overlapX){
        if(bird.y - BIRD_R < ob.gapY || bird.y + BIRD_R > ob.gapY + ob.gapH){
          return endGame();
        }
      }
      if(ob.type==='block' && !ob.destroyed && overlapX){
        const towerTop = H - GROUND_H - ob.h;
        if(bird.y + BIRD_R > towerTop){
          if(boosting){
            ob.destroyed = true;
            score += 5;
            blocksDestroyed += 1;
            playSmashSound();
          } else {
            return endGame();
          }
        }
      }

      if(!ob.passed && ob.x + ob.w < BIRD_X - BIRD_R){
        ob.passed = true;
        score += 1;
        boost = Math.min(BOOST_MAX, boost + BOOST_GAIN);
      }
    }

    obstacles = obstacles.filter(o => o.x + o.w > -40);

    scoreBox.textContent = score;
    const pct = boosting ? 100 : boost;
    boostFill.style.width = pct + '%';
    boostFill.classList.toggle('full', boost>=BOOST_MAX && !boosting);
    boostBtn.disabled = !(boost>=BOOST_MAX && !boosting);
  }

  function endGame(){
    state = 'gameover';
    hud.style.display = 'none';
    boostBtnWrap.style.display = 'none';
    hint.style.display = 'none';
    finalScore.textContent = score;
    playGameOverSound();
    goSub.textContent = blocksDestroyed > 0
      ? `GAME OVER — smashed ${blocksDestroyed} block${blocksDestroyed>1?'s':''}`
      : 'GAME OVER';
    saveScoreIfBest(username, score, blocksDestroyed).then(()=>{
      fetchLeaderboard(5).then(entries => renderLeaderboard(goLbRows, entries, username));
    });
    saveHistory({
      username, score, blocks: blocksDestroyed,
      level: currentDiff.name,
      timestamp: Date.now()
    });
    gameOverOverlay.classList.remove('hidden');
  }

  // ---------- Rendering ----------
  function draw(){
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, '#170c2e');
    g.addColorStop(0.55, '#5a2a6b');
    g.addColorStop(1, '#ff7b4d');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    ctx.save();
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = '#ffd166';
    ctx.beginPath(); ctx.arc(W-70, 110, 38, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    ctx.fillStyle = '#ffffff22';
    for(let i=0;i<3;i++){
      const cx = ((bg.cloud + i*150) % (W+100)) - 50;
      drawCloud(cx, 60+i*40);
    }

    ctx.fillStyle = '#2a1840';
    drawMountains(bg.mountain);

    if(state==='playing' || state==='gameover'){
      for(const ob of obstacles) drawObstacle(ob);
    }

    drawGround();

    if(state==='playing' || state==='ready' || state==='gameover'){
      drawSlingshot();
      drawBird();
    }

    if(levelBanner > 0){
      drawLevelBanner();
    }
  }

  function drawLevelBanner(){
    const lvl = currentDiff;
    const t = levelBanner;
    const alpha = t > 1.2 ? (1.6-t)/0.4 : Math.min(1, t/0.5);
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
    ctx.textAlign = 'center';
    ctx.fillStyle = '#000000aa';
    ctx.fillRect(0, H/2-46, W, 60);
    ctx.font = "800 26px 'Baloo 2', sans-serif";
    ctx.fillStyle = lvl.color;
    ctx.fillText('LEVEL UP — ' + lvl.name, W/2, H/2-8);
    ctx.restore();
  }

  function drawCloud(x,y){
    ctx.beginPath();
    ctx.arc(x,y,18,0,Math.PI*2);
    ctx.arc(x+18,y+6,14,0,Math.PI*2);
    ctx.arc(x-16,y+6,14,0,Math.PI*2);
    ctx.fill();
  }

  function drawMountains(offset){
    ctx.beginPath();
    ctx.moveTo(-offset, H-GROUND_H);
    for(let x=-offset; x<W+60; x+=80){
      ctx.lineTo(x+40, H-GROUND_H-70);
      ctx.lineTo(x+80, H-GROUND_H);
    }
    ctx.lineTo(W+60,H-GROUND_H);
    ctx.closePath();
    ctx.fill();
  }

  function drawGround(){
    ctx.fillStyle = '#3d2c1f';
    ctx.fillRect(0, H-GROUND_H, W, GROUND_H);
    ctx.fillStyle = '#5a4128';
    ctx.fillRect(0, H-GROUND_H, W, 10);
    ctx.fillStyle = '#6e5232';
    for(let x = -bg.ground; x<W; x+=40){
      ctx.fillRect(x, H-GROUND_H, 22, 5);
    }
  }

  function drawObstacle(ob){
    if(ob.type==='pipe'){
      drawFlamePillar(ob.x, 0, ob.w, ob.gapY, true);
      drawFlamePillar(ob.x, ob.gapY+ob.gapH, ob.w, H-GROUND_H-(ob.gapY+ob.gapH), false);
    } else if(!ob.destroyed){
      const top = H-GROUND_H-ob.h;
      const rows = Math.max(2, Math.round(ob.h/42));
      const rowH = ob.h/rows;
      for(let i=0;i<rows;i++){
        const y = top + i*rowH;
        ctx.fillStyle = i%2===0 ? '#a9682f' : '#8d5a26';
        ctx.fillRect(ob.x, y+2, ob.w, rowH-4);
        ctx.strokeStyle = '#5c3a17';
        ctx.lineWidth = 2;
        ctx.strokeRect(ob.x, y+2, ob.w, rowH-4);
      }
      if(boosting){
        ctx.save();
        ctx.globalAlpha = 0.5 + Math.sin(performance.now()/40)*0.2;
        ctx.strokeStyle = '#ffb703';
        ctx.lineWidth = 3;
        ctx.strokeRect(ob.x-2, top-2, ob.w+4, ob.h+4);
        ctx.restore();
      }
    }
  }

  // Fire-themed pillar: charred body + flickering flame tip near the gap, with rising embers
  function drawFlamePillar(x, y, w, h, tipAtBottom){
    if(h <= 0) return;
    const grad = ctx.createLinearGradient(x, y, x, y+h);
    if(tipAtBottom){
      grad.addColorStop(0, '#2a0e08');
      grad.addColorStop(0.72, '#7a2008');
      grad.addColorStop(1, '#ff7a1a');
    } else {
      grad.addColorStop(0, '#ff7a1a');
      grad.addColorStop(0.28, '#7a2008');
      grad.addColorStop(1, '#2a0e08');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, w, h);

    ctx.strokeStyle = '#1a0703';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);

    const tipY = tipAtBottom ? y+h : y;
    drawFlameTip(x, tipY, w, tipAtBottom);
    drawEmbers(x, tipY, w, tipAtBottom);
  }

  function drawFlameTip(x, baseY, w, pointDown){
    const t = performance.now()/110;
    const dir = pointDown ? 1 : -1;
    const spikes = 5;
    ctx.save();
    ctx.shadowColor = '#ff8800';
    ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.moveTo(x, baseY);
    for(let i=0; i<=spikes; i++){
      const sx = x + (w/spikes)*i;
      const flick = 12 + Math.sin(t + i*1.7)*6 + Math.sin(t*1.9 + i*0.6)*5;
      ctx.lineTo(sx, baseY + dir*flick);
      if(i<spikes){
        const midX = sx + (w/spikes)/2;
        const midFlick = flick*0.45 + Math.sin(t*2.3+i)*3;
        ctx.lineTo(midX, baseY + dir*midFlick);
      }
    }
    ctx.lineTo(x+w, baseY);
    ctx.closePath();
    const g = ctx.createLinearGradient(x, baseY, x, baseY + dir*26);
    g.addColorStop(0, '#ffe066');
    g.addColorStop(0.5, '#ff9500');
    g.addColorStop(1, '#ff3b0f');
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  }

  function drawEmbers(x, baseY, w, pointDown){
    const dir = pointDown ? -1 : 1;
    const t = performance.now()/1000;
    for(let i=0; i<3; i++){
      const phase = (t*0.6 + i*0.37) % 1;
      const ex = x + w*((i+1)/4) + Math.sin(t*2+i*2)*4;
      const ey = baseY + dir*(8 + phase*34);
      const alpha = 1 - phase;
      ctx.save();
      ctx.globalAlpha = Math.max(0, alpha*0.8);
      ctx.fillStyle = i%2===0 ? '#ffcc55' : '#ff7a1a';
      ctx.beginPath();
      ctx.arc(ex, ey, 2.2 - phase*1.2, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawSlingshot(){
    const baseX = BIRD_X - 4;
    const baseY = H-GROUND_H;
    ctx.strokeStyle = '#7a481f';
    ctx.lineWidth = 7;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(baseX-16, baseY);
    ctx.lineTo(baseX-10, baseY-46);
    ctx.moveTo(baseX+16, baseY);
    ctx.lineTo(baseX+10, baseY-46);
    ctx.stroke();

    const pull = boosting ? 0 : Math.min(1, boost/BOOST_MAX);
    const bandBackX = bird.x_disp !== undefined ? bird.x_disp : BIRD_X - pull*16;
    ctx.strokeStyle = '#3d2410';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(baseX-10, baseY-46);
    ctx.lineTo(bandBackX, bird.y);
    ctx.moveTo(baseX+10, baseY-46);
    ctx.lineTo(bandBackX, bird.y);
    ctx.stroke();
  }

  function drawBird(){
    const pull = boosting ? -10 : Math.min(1, boost/BOOST_MAX)*14;
    const drawX = BIRD_X - pull;
    bird.x_disp = drawX;
    const tilt = bird.rot;

    ctx.save();
    ctx.translate(drawX, bird.y);
    ctx.rotate(tilt);

    if(boosting){
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.strokeStyle = '#ffd166';
      ctx.lineWidth = 4;
      for(let i=1;i<=3;i++){
        ctx.beginPath();
        ctx.moveTo(-BIRD_R-6*i, -4*i+8);
        ctx.lineTo(-BIRD_R-6*i-14, -4*i+8);
        ctx.stroke();
      }
      ctx.restore();
    }

    ctx.beginPath();
    ctx.fillStyle = '#a91f2c';
    ctx.ellipse(0,0, BIRD_R, BIRD_R*1.05, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#e6394b';
    ctx.beginPath();
    ctx.ellipse(-2,-2, BIRD_R-3, BIRD_R*1.05-3, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#fff3d6';
    ctx.beginPath();
    ctx.ellipse(-2, 5, BIRD_R-7, BIRD_R-9, 0, 0, Math.PI*2);
    ctx.fill();

    const wingFlap = Math.sin(performance.now()/80) * 4 - flapAnim*6;
    ctx.fillStyle = '#7a1620';
    ctx.beginPath();
    ctx.ellipse(-2, 4+wingFlap, 9, 5, 0.3, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#ffb703';
    ctx.beginPath();
    ctx.moveTo(BIRD_R-4, -2);
    ctx.lineTo(BIRD_R+8, 2);
    ctx.lineTo(BIRD_R-4, 6);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#1a0f30';
    ctx.beginPath();
    ctx.arc(BIRD_R-7, -3, 3.2, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(BIRD_R-6, -4, 1, 0, Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = '#5c1018';
    ctx.lineWidth = 2.4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(BIRD_R-13, -8);
    ctx.lineTo(BIRD_R-6, -10);
    ctx.stroke();

    ctx.restore();
  }

  // ---------- Loop ----------
  function loop(t){
    if(!lastTime) lastTime = t;
    const dt = Math.min(0.033, (t-lastTime)/1000);
    lastTime = t;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  // ---------- UI wiring ----------
  const hud = document.getElementById('hud');
  const scoreBox = document.getElementById('scoreBox');
  const playerTag = document.getElementById('playerTag');
  const levelBadge = document.getElementById('levelBadge');
  const boostFill = document.getElementById('boostFill');
  const boostBtnWrap = document.getElementById('boostBtnWrap');
  const boostBtn = document.getElementById('boostBtn');
  const hint = document.getElementById('hint');
  const loginOverlay = document.getElementById('loginOverlay');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const historyOverlay = document.getElementById('historyOverlay');
  const historyList = document.getElementById('historyList');
  const historyBtnLogin = document.getElementById('historyBtnLogin');
  const historyBtnGO = document.getElementById('historyBtnGO');
  const historyCloseBtn = document.getElementById('historyCloseBtn');
  const nameInput = document.getElementById('nameInput');
  const startBtn = document.getElementById('startBtn');
  const retryBtn = document.getElementById('retryBtn');
  const switchPlayerBtn = document.getElementById('switchPlayerBtn');
  const finalScore = document.getElementById('finalScore');
  const goSub = document.getElementById('goSub');
  const loginLbRows = document.getElementById('loginLbRows');
  const goLbRows = document.getElementById('goLbRows');

  function startGame(){
    resetGame();
    state = 'playing';
    hud.style.display = 'flex';
    boostBtnWrap.style.display = 'block';
    hint.style.display = 'block';
    loginOverlay.classList.add('hidden');
    gameOverOverlay.classList.add('hidden');
    playerTag.textContent = username.toUpperCase();
    levelBadge.textContent = currentDiff.name;
    levelBadge.style.color = currentDiff.color;
    boostFill.style.width = '0%';
    boostBtn.disabled = true;
  }

  startBtn.addEventListener('click', ()=>{
    const name = nameInput.value.trim();
    if(!name){ nameInput.focus(); nameInput.style.borderColor = '#e6394b'; return; }
    username = name.slice(0,16);
    setProfile(username);
    startGame();
  });

  nameInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') startBtn.click(); });
  nameInput.addEventListener('input', ()=>{ nameInput.style.borderColor = ''; });

  retryBtn.addEventListener('click', startGame);
  switchPlayerBtn.addEventListener('click', ()=>{
    state = 'login';
    gameOverOverlay.classList.add('hidden');
    loginOverlay.classList.remove('hidden');
    nameInput.value = '';
    nameInput.focus();
    fetchLeaderboard(5).then(entries => renderLeaderboard(loginLbRows, entries, ''));
  });

  boostBtn.addEventListener('click', tryBoost);

  function openHistory(){
    historyOverlay.classList.remove('hidden');
    historyList.innerHTML = '<div class="lb-empty">Loading…</div>';
    fetchHistory(50).then(entries => renderHistory(historyList, entries));
  }
  historyBtnLogin.addEventListener('click', openHistory);
  historyBtnGO.addEventListener('click', openHistory);
  historyCloseBtn.addEventListener('click', ()=> historyOverlay.classList.add('hidden'));

  const muteBtn = document.getElementById('muteBtn');
  muteBtn.addEventListener('click', ()=>{
    muted = !muted;
    muteBtn.textContent = muted ? '🔇' : '🔊';
    if(!muted) ensureAudio();
  });

  canvas.addEventListener('pointerdown', (e)=>{
    preloadGameOverSound(); // preload on first gesture
    if(state==='playing') flap();
  });
  window.addEventListener('keydown', (e)=>{
    if(e.code==='Space' || e.code==='ArrowUp'){
      e.preventDefault();
      flap();
    } else if(e.code==='KeyB'){
      tryBoost();
    }
  });

  // ---------- Init ----------
  resetGame();
  draw();
  requestAnimationFrame(loop);

  getProfile().then(name=>{
    if(name) nameInput.value = name;
  });
  fetchLeaderboard(5).then(entries => renderLeaderboard(loginLbRows, entries, ''));
})();
</script>
</body>
</html>
